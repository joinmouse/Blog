<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Blog</title>
    <script>
      // Restore SPA path that 404.html encoded into ?p=…
      (function () {
        var l = window.location;
        if (l.search.indexOf('?p=') === 0 || l.search.indexOf('&p=') !== -1) {
          var q = {};
          l.search
            .slice(1)
            .split('&')
            .forEach(function (kv) {
              var i = kv.indexOf('=');
              if (i > -1) q[kv.slice(0, i)] = kv.slice(i + 1).replace(/~and~/g, '&');
            });
          if (q.p !== undefined) {
            var newUrl =
              l.pathname.replace(/\/$/, '') +
              q.p +
              (q.q ? '?' + q.q : '') +
              l.hash;
            window.history.replaceState(null, '', newUrl);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
